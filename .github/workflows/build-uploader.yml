name: build-uploader

# Builds the standalone Windows uploader binary and attaches it to a GitHub
# Release. Triggered by pushing a tag matching `uploader-v*` (e.g.
# `uploader-v1.0.0`) — that tag also becomes the release name. The
# auto-update flow in the uploader itself reads `tag_name` from
# api.github.com/releases/latest to detect updates.

on:
  push:
    tags:
      - "uploader-v*"
  # Also allow manual builds from the Actions tab for testing without cutting a real release.
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release from this manual run"
        type: boolean
        default: false

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create the release + upload the .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project deps
        # We install the project + PyInstaller. The .spec file's excludes
        # keep the final .exe small even though we install everything.
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build .exe
        run: |
          cd packaging
          uv run pyinstaller taiko-uploader.spec --clean --noconfirm

      - name: Sanity check output
        # Fail early if the build didn't produce what we expect.
        shell: pwsh
        run: |
          $exe = "packaging/dist/taiko-uploader.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Expected $exe to exist but it doesn't."
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Built taiko-uploader.exe — $([math]::Round($size, 1)) MB"

      - name: Upload build artifact
        # Attach to the workflow run so we can grab it even when there's no release
        uses: actions/upload-artifact@v4
        with:
          name: taiko-uploader-windows
          path: packaging/dist/taiko-uploader.exe

      - name: Create / update GitHub Release
        # Only for real tag pushes OR manual runs that opted in.
        if: startsWith(github.ref, 'refs/tags/uploader-v') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/taiko-uploader.exe
          # Tag from the push event; for manual dispatch we synthesize one.
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('uploader-manual-{0}', github.run_number) }}
          # Skip release-notes generation entirely for now — just an
          # asset drop. We can add proper notes when we have a changelog.
          body: |
            Windows standalone uploader.

            Download `taiko-uploader.exe`, run it once — first launch prompts for
            your API token from https://taiko.umaladder.moe/settings/tokens.

            Windows SmartScreen may show "unrecognized publisher" on first run —
            click "More info" then "Run anyway". The binary is not code-signed
            (adding that requires a paid cert; may come later).
          prerelease: ${{ github.ref_type != 'tag' }}
